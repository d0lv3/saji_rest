<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>تحميل تطبيق صاجي — أندرويد</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      position: relative;
      direction: rtl;
    }

    /* ── Decorative Background Elements ── */
    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
    }
    .bg-glow-1 {
      width: 500px; height: 500px;
      background: #FF6B00;
      top: -120px; right: -100px;
    }
    .bg-glow-2 {
      width: 400px; height: 400px;
      background: #e67e22;
      bottom: -80px; left: -60px;
      opacity: 0.15;
    }
    .bg-glow-3 {
      width: 300px; height: 300px;
      background: #FF6B00;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.08;
    }

    /* Subtle grid pattern */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Main Layout ── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px 70px 50px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(255,107,0,0.4));
    }
    .brand-name {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .platform-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(61, 220, 132, 0.15);
      border: 1px solid rgba(61, 220, 132, 0.25);
      border-radius: 50px;
      padding: 10px 22px 10px 18px;
    }
    .platform-badge svg {
      flex-shrink: 0;
    }
    .platform-badge span {
      font-size: 18px;
      font-weight: 700;
      color: #3DDC84;
    }

    /* ── Title Area ── */
    .title-section {
      text-align: center;
      margin-bottom: 38px;
    }
    .title {
      font-size: 44px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .title .highlight {
      color: #FF6B00;
      position: relative;
    }
    .subtitle {
      font-size: 19px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }

    /* ── Steps Container ── */
    .steps {
      display: flex;
      gap: 24px;
      flex: 1;
      direction: rtl;
    }

    .step {
      flex: 1;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      transition: transform 0.3s;
    }

    .step-number {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF6B00 0%, #e67e22 100%);
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    }

    .step-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .step h3 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .step p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    /* Arrow connectors between steps */
    .step-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 32px;
    }

    /* ── Footer / URL ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .url-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,107,0,0.3);
      border-radius: 14px;
      padding: 14px 28px;
    }
    .url-box svg {
      flex-shrink: 0;
    }
    .url-box span {
      font-size: 24px;
      font-weight: 700;
      color: #FF6B00;
      direction: ltr;
      letter-spacing: 0.5px;
    }
    .footer-note {
      font-size: 15px;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <!-- Decorative BG -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="bg-grid"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-right">
        <img src="../asstes/saji_app_logo.png" alt="صاجي" class="logo-img">
        <span class="brand-name">مطعم صاجي</span>
      </div>
      <div class="platform-badge">
        <!-- Android Robot Icon -->
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#3DDC84">
          <path d="M17.523 2.266l1.41-2.022a.4.4 0 00-.66-.46l-1.46 2.09A7.702 7.702 0 0012 .93a7.702 7.702 0 00-4.813.944L5.727-.216a.4.4 0 00-.66.46l1.41 2.022A7.25 7.25 0 002.5 8.5h19a7.25 7.25 0 00-3.977-6.234zM7.5 6a1 1 0 110-2 1 1 0 010 2zm9 0a1 1 0 110-2 1 1 0 010 2zM3.5 10C2.672 10 2 10.672 2 11.5v7c0 .828.672 1.5 1.5 1.5S5 19.328 5 18.5v-7C5 10.672 4.328 10 3.5 10zm1.5 0v9.5c0 .828.672 1.5 1.5 1.5h1v3.5c0 .828.672 1.5 1.5 1.5s1.5-.672 1.5-1.5V21h2v3.5c0 .828.672 1.5 1.5 1.5s1.5-.672 1.5-1.5V21h1c.828 0 1.5-.672 1.5-1.5V10H5zm15.5 0c-.828 0-1.5.672-1.5 1.5v7c0 .828.672 1.5 1.5 1.5s1.5-.672 1.5-1.5v-7c0-.828-.672-1.5-1.5-1.5z"/>
        </svg>
        <span>أندرويد</span>
      </div>
    </div>

    <!-- Title -->
    <div class="title-section">
      <h1 class="title">كيف تحمّل تطبيق <span class="highlight">صاجي؟</span></h1>
      <p class="subtitle">٣ خطوات بسيطة وتطبيقك جاهز!</p>
    </div>

    <!-- Steps -->
    <div class="steps">
      <!-- Step 1 -->
      <div class="step">
        <div class="step-number">١</div>
        <div class="step-icon">
          <!-- Globe/Link icon -->
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
          </svg>
        </div>
        <h3>افتح الرابط</h3>
        <p>افتح المتصفح وادخل على<br><strong style="color:#FF6B00; direction:ltr; display:inline-block;">rest.live</strong></p>
      </div>

      <!-- Arrow -->
      <div class="step-arrow">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>

      <!-- Step 2 -->
      <div class="step">
        <div class="step-number">٢</div>
        <div class="step-icon">
          <!-- Three dots menu icon -->
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1.5" fill="#FF6B00"/>
            <circle cx="12" cy="12" r="1.5" fill="#FF6B00"/>
            <circle cx="12" cy="19" r="1.5" fill="#FF6B00"/>
          </svg>
        </div>
        <h3>اضغط على القائمة</h3>
        <p>اضغط على <strong style="color:#fff;">⋮</strong> (ثلاث نقاط)<br>في أعلى المتصفح</p>
      </div>

      <!-- Arrow -->
      <div class="step-arrow">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>

      <!-- Step 3 -->
      <div class="step">
        <div class="step-number">٣</div>
        <div class="step-icon">
          <!-- Download/Install icon -->
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <h3>ثبّت التطبيق</h3>
        <p>اختر <strong style="color:#fff;">"تثبيت التطبيق"</strong><br>أو "إضافة إلى الشاشة الرئيسية"</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="url-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        <span>rest.live</span>
      </div>
      <span class="footer-note">مجاني • بدون متجر</span>
    </div>
  </div>
</body>
</html>
